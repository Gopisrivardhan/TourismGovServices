spring.application.name=GatewayAPI
server.port=8383
 

# Config Server Setup (This fixes the FAILED TO START error!)
spring.config.import=optional:configserver:http://localhost:8181
# Eureka Client Setup
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
 
# Spring Cloud Gateway Base Setup
spring.cloud.gateway.discovery.locator.enabled=false
spring.cloud.gateway.discovery.locator.lower-case-service-id=true
 
# ==========================================
# GATEWAY ROUTES FOR ALL MICROSERVICES
# ==========================================
 
# 1. User & Auth Service
spring.cloud.gateway.routes[0].id=user-service-route
spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/tourismgov/v1/users/**,/tourismgov/v1/auth/**
spring.cloud.gateway.routes[0].filters[0]=AuthenticationFilter
 
# 2. Event & Booking Service
spring.cloud.gateway.routes[1].id=event-service-route
spring.cloud.gateway.routes[1].uri=lb://EVENT-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/tourismgov/v1/events/**,/tourismgov/v1/bookings/**
spring.cloud.gateway.routes[1].filters[0]=AuthenticationFilter
 
# 3. Tourist Profile Service
spring.cloud.gateway.routes[2].id=tourist-service-route
spring.cloud.gateway.routes[2].uri=lb://TOURIST-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/tourismgov/v1/tourists/**
spring.cloud.gateway.routes[2].filters[0]=AuthenticationFilter
 
# 4. Notification & Audit Service
spring.cloud.gateway.routes[3].id=notification-service-route
spring.cloud.gateway.routes[3].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/tourismgov/v1/notifications/**,/tourismgov/v1/audit-logs/**
spring.cloud.gateway.routes[3].filters[0]=AuthenticationFilter
 
# 5. Heritage & Tourism Program Service
spring.cloud.gateway.routes[4].id=program-service-route
spring.cloud.gateway.routes[4].uri=lb://PROGRAM-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/tourismgov/v1/sites/**,/tourismgov/v1/programs/**
spring.cloud.gateway.routes[4].filters[0]=AuthenticationFilter