spring.application.name=GatewayAPI
server.port=8383
 
# Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
 
# Config Server
spring.config.import=optional:configserver:http://localhost:8181

# ==========================================
# Spring Cloud Gateway Routes
# ==========================================

# 1. User Service
spring.cloud.gateway.routes[0].id=user-service-route
spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/tourismgov/v1/users/**,/tourismgov/v1/auth/**,/tourismgov/v1/audit-logs/**
spring.cloud.gateway.routes[0].filters[0]=Authentication

# 2. Event Service
spring.cloud.gateway.routes[1].id=event-service-route
spring.cloud.gateway.routes[1].uri=lb://EVENT-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/tourismgov/v1/events/**,/tourismgov/v1/bookings/**
spring.cloud.gateway.routes[1].filters[0]=Authentication

# 3. Tourist Service
spring.cloud.gateway.routes[2].id=tourist-service-route
spring.cloud.gateway.routes[2].uri=lb://TOURIST-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/tourismgov/v1/tourist/**,/tourismgov/v1/touristdoc/**
spring.cloud.gateway.routes[2].filters[0]=Authentication

# 4. Notification Service
spring.cloud.gateway.routes[3].id=notification-service-route
spring.cloud.gateway.routes[3].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/tourismgov/v1/notifications/**
spring.cloud.gateway.routes[3].filters[0]=Authentication

# 5. Site Service
spring.cloud.gateway.routes[4].id=site-service-route
spring.cloud.gateway.routes[4].uri=lb://SITE-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/tourismgov/v1/sites/**,/tourismgov/v1/preservation/**
spring.cloud.gateway.routes[4].filters[0]=Authentication

# 6. Compliance Service
spring.cloud.gateway.routes[5].id=compliance-service-route
spring.cloud.gateway.routes[5].uri=lb://COMPLIANCE-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/tourismgov/v1/audits/**,/tourismgov/v1/compliance/records/**
spring.cloud.gateway.routes[5].filters[0]=Authentication

# 7. Report Service
spring.cloud.gateway.routes[6].id=report-service-route
spring.cloud.gateway.routes[6].uri=lb://REPORT-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/tourismgov/v1/dashboard/**,/tourismgov/v1/reports/**
spring.cloud.gateway.routes[6].filters[0]=Authentication

# 8. Program Service
spring.cloud.gateway.routes[7].id=program-service-route
spring.cloud.gateway.routes[7].uri=lb://PROGRAM-SERVICE
spring.cloud.gateway.routes[7].predicates[0]=Path=/tourismgov/v1/programs/**,/tourismgov/v1/resources/**
spring.cloud.gateway.routes[7].filters[0]=Authentication